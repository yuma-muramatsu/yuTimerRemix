<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Timer - 仕事用タイマー</title>
    <meta name="description" content="タスク管理機能付きのビジュアルワークタイマー。残り時間を直感的に把握できます。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3.0">
</head>

<body>
    <div class="app">
        <!-- Main Content - Two Column Layout -->
        <main class="main">
            <!-- Left: Timer -->
            <div class="left-panel">
                <section class="timer-section">
                    <!-- Visual Timer (Time Timer style) -->
                    <div class="timer-visual-container">
                        <div class="timer-clock" id="timerClock">
                            <svg class="timer-svg" viewBox="0 0 300 300" id="timerSvg">
                                <!-- Background circle (timer face) -->
                                <circle cx="150" cy="150" r="130" class="timer-bg" />

                                <!-- Minute marks -->
                                <g id="minuteMarks" class="minute-marks"></g>

                                <!-- Number labels -->
                                <g id="numberLabels" class="number-labels"></g>

                                <!-- Remaining time wedge (the colored pie area) -->
                                <path id="timerWedge" class="timer-wedge" d="" />

                                <!-- Center text background -->
                                <circle cx="150" cy="150" r="55" class="timer-text-bg" />

                                <!-- Center time display -->
                                <text x="150" y="153" class="timer-text" id="timerText">25:00</text>
                            </svg>

                            <!-- Mode Label (Integrated into clock) -->
                            <div class="mode-label" id="modeLabel"></div>

                            <!-- Glow effect -->
                            <div class="timer-glow" id="timerGlow"></div>
                        </div>
                    </div>

                    <!-- Controls -->
                    <div class="controls">
                        <button class="control-btn btn-start" id="btnStart">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="5 3 19 12 5 21 5 3" />
                            </svg>
                        </button>
                        <button class="control-btn btn-pause hidden" id="btnPause">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <rect x="6" y="4" width="4" height="16" />
                                <rect x="14" y="4" width="4" height="16" />
                            </svg>
                        </button>
                        <button class="control-btn btn-resume hidden" id="btnResume">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="5 3 19 12 5 21 5 3" />
                            </svg>
                        </button>
                        <button class="control-btn btn-reset" id="btnReset">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10" />
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                            </svg>
                        </button>
                    </div>
                </section>
            </div>

            <!-- Right: Settings + Input + History -->
            <div class="right-panel">
                <!-- 1. Settings Card (Now Single Row) -->
                <div class="timer-settings-card single-row">
                    <div class="settings-group">
                        <div class="time-presets">
                            <button class="preset-btn active" data-minutes="25" id="preset25">25</button>
                            <button class="preset-btn" data-minutes="15" id="preset15">15</button>
                            <button class="preset-btn" data-minutes="10" id="preset10">10</button>
                            <button class="preset-btn" data-minutes="5" id="preset5">5</button>
                            <div class="preset-custom">
                                <input type="number" id="customMinutes" class="custom-input" min="1" max="120"
                                    placeholder="分">
                                <button class="preset-btn preset-set" id="presetCustom">OK</button>
                            </div>
                        </div>
                    </div>

                    <div class="vertical-divider"></div>

                    <div class="settings-group">
                        <div class="size-toggle">
                            <button class="size-btn" data-size="s">S</button>
                            <button class="size-btn active" data-size="m">M</button>
                            <button class="size-btn" data-size="l">L</button>
                        </div>
                    </div>

                    <div class="vertical-divider"></div>

                    <div class="settings-group">
                        <div class="interval-settings">
                            <label class="interval-toggle-label">
                                <input type="checkbox" id="intervalToggle" class="interval-checkbox">
                                <span class="interval-switch"></span>
                                <span class="interval-label-text">ON</span>
                            </label>
                            <div class="break-setting" id="intervalStatus">
                                <span class="break-label">休憩:</span>
                                <input type="number" id="breakTimeInput" class="break-input" value="5" min="1" max="30">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. Task Input -->
                <div class="task-input-container">
                    <div class="task-input-wrapper">
                        <svg class="task-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                        </svg>
                        <input type="text" id="taskInput" class="task-input" placeholder="これからのタスクを入力..."
                            autocomplete="off">
                    </div>
                </div>

                <!-- 3. Task History (Collapsible) -->
                <section class="history-section" id="historySection">
                    <div class="history-header" id="historyHeader">
                        <div class="history-title-group">
                            <button class="toggle-btn" id="btnToggleHistory">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                                    height="16">
                                    <polyline points="6 9 12 15 18 9" />
                                </svg>
                            </button>
                            <h2>履歴</h2>
                        </div>
                        <div class="history-actions">
                            <div class="today-total-badge" id="todayStats" title="今日の合計">
                                <strong id="todayTotal">0:00:00</strong>
                            </div>
                            <button class="clear-btn" id="btnClearHistory">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14"
                                    height="14">
                                    <polyline points="3 6 5 6 21 6" />
                                    <path
                                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="task-list" id="taskList">
                        <div class="empty-state" id="emptyState">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36"
                                height="36">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                <line x1="9" y1="9" x2="15" y2="15" />
                                <line x1="15" y1="9" x2="9" y2="15" />
                            </svg>
                            <p>履歴なし</p>
                            <span>タイマーを使ってタスクに取り組みましょう</span>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Audio for timer completion -->
    <audio id="alarmSound" preload="auto"></audio>

    <script src="app.js?v=3.0"></script>
</body>

</html>
